version: '3.8'

services:
  math-team:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pent-eam-math-team
    volumes:
      # Agent definitions (read-only)
      - ../AI:/app/AI:ro
      # Project directories (read-write)
      - ../input:/app/input:rw
      - ../output:/app/output:rw
      - ../communication:/app/communication:rw
      - ../decisions:/app/decisions:rw
      # OpenHands configuration (read-write)
      - ../.openhands:/app/.openhands:rw
      - ../.agents:/app/.agents:ro
      - ../.mcp:/app/.mcp:ro
      - ../.cursorrules:/app/.cursorrules:ro
      - ../AGENTS.md:/app/AGENTS.md:ro
      - ../requirements.txt:/app/requirements.txt:ro
      # OpenHands persistence
      - ~/.openhands:/root/.openhands
    environment:
      # Ollama Configuration (running on macOS host)
      # Container accesses Ollama via host.docker.internal
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal:11434}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Agent-specific models (lightweight local models)
      - SUPERVISOR_MODEL=${SUPERVISOR_MODEL:-llama3.2:3b}
      - CREATIVE_MATH_MODEL=${CREATIVE_MATH_MODEL:-llama3.2:3b}
      - SENIOR_MATH_MODEL=${SENIOR_MATH_MODEL:-llama3.2:3b}
      - PYTHON_CODER_MODEL=${PYTHON_CODER_MODEL:-codellama:7b}
      - TESTER_MODEL=${TESTER_MODEL:-llama3.2:3b}
      # Fallback to OpenAI if needed
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      # Python virtual environment
      - VIRTUAL_ENV=/app/.venv
      - PATH=/app/.venv/bin:$PATH
    # Default bridge network with host.docker.internal for Ollama access
    stdin_open: true
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    ports:
      - "3000:3000"

networks:
  default:
    name: pent-eam-net
    driver: bridge